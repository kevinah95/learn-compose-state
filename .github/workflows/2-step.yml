name: Paso 2 — remember

on:
  push:
    branches:
      - main
    paths:
      - 'shared/src/commonMain/kotlin/io/github/kevinah95/myapplication/screens/ContadorScreen.kt'

jobs:
  check_step_2:
    name: Verificar Paso 2
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar uso de remember en ContadorScreen.kt
        id: check
        run: |
          FILE="shared/src/commonMain/kotlin/io/github/kevinah95/myapplication/screens/ContadorScreen.kt"

          if ! grep -q "remember" "$FILE"; then
            echo "⏭️ Paso 2 aún no completado — 'remember' no encontrado."
            exit 0
          fi

          if ! grep -q "mutableStateOf" "$FILE"; then
            echo "⏭️ Paso 2 incompleto — falta 'mutableStateOf'."
            exit 0
          fi

          echo "✅ Uso correcto de remember { mutableStateOf(...) } detectado."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 3 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          gh issue comment "$ISSUE_NUMBER" \
            --body "$(cat .github/steps/3-step.md)"
